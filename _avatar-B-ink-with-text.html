<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Avatar B · Moss · with text</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 100%; overflow: hidden; }
  body { background: #354238; }
  .avatar {
    width: 1080px; height: 1080px;
    background: #354238;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    padding: 80px;
  }
  .avatar img { width: 56%; height: auto; }
  .avatar .name {
    font-family: 'Noto Serif TC', serif;
    font-weight: 500;
    font-size: 76px;
    letter-spacing: 0.4em;
    color: #EBEBEB;
  }
</style>
</head>
<body>
  <div class="avatar">
    <img src="assets/logo-mist.svg" alt="Logo">
    <div class="name">原子量子24</div>
  </div>
</body>
</html>
